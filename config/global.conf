# 全场景错题管理系统 全局配置文件

# 支持的科目列表（后续可根据需要增删）
SUBJECTS=("数学" "英语" "物理" "化学" "生物" "语文" "历史" "地理" "政治")

# 错题文件命名规则：ID_时间戳.md
FILE_NAME_FORMAT="%s_%s.md"

# 检索结果每页显示数量
PAGE_SIZE=10

# 日志级别：INFO(普通) / ERROR(错误) / DEBUG(调试)
LOG_LEVEL="INFO"

# 复习相关默认配置
DEFAULT_REVIEW_TIMES=3                                                                          

# 复习提醒频率（分钟）
REVIEW_NOTIFY_INTERVAL=60

# 复习间隔天数，遵循艾宾浩斯曲线
REVIEW_INTERVALS="1 2 4 7 15 30"

# 是否启用日志记录
ENABLE_LOGGING=true

# 日志文件路径
LOG_FILE_PATH="/path/to/your/repo/data/logs/review.log"

# 数据目录路径
DATA_DIR="/path/to/your/repo/data"

# 科目目录路径
SUBJECTS_DIR="$DATA_DIR/subjects"

# 系统通知命令（如 xmessage）
NOTIFY_CMD="xmessage"

# 系统通知标题
NOTIFY_TITLE="复习提醒"

# 复习记录更新时的日志消息
REVIEW_LOG_MESSAGE="[$(date '+%F %T')] 完成复习: %QUESTION%"

# 复习提醒的默认消息
DEFAULT_REMINDER_MESSAGE="今日复习: %QUEST
